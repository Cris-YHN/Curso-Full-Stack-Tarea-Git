<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Formulario de Inscripción</h1>
        <button id="btn-toogle">Toogle</button>
    </header>
    <form>
        <div class="campo">
            <label>Nombre</label>
            <input type="text" pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+" minlength="2" maxlength="30" placeholder="Nombre" autofocus required>
        </div>
        <div class="campo">
            <label>Apellido</label>
            <input type="text" pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+" minlength="2" maxlength="30" placeholder="Apellido" required>
        </div>
        <div class="campo">
            <label>Email</label>
            <input type="email" placeholder="Email" required>
        </div>
        <div class="campo">
            <label>Fecha de Nacimiento</label>
            <input type="date" required>
        </div>
        <div class="campo">
            <label>Pais de Residencia</label>
            <input type="text" id="Pais" list="listapaises" required>
                <datalist id="listapaises">
                    <option label="Argentina" value="AR"></option>
                    <option label="Bolivia" value="BO"></option>
                    <option label="Brasil" value="BR"></option>
                    <option label="Chile" value="CL"></option>
                    <option label="Colombia" value="CO"></option>
                    <option label="Ecuador" value="EC"></option>
                    <option label="Paraguay" value="PY"></option>
                    <option label="Peru" value="PE"></option>
                    <option label="Venezuela" value="VE"></option>
                    <option label="Uruguay" value="UY"></option>
                </datalist>
        </div>
        <div class="campo">
            <input type="submit" value="Enviar" class="btn-enviar">
        </div>
    </form>
    <script src="script.js"></script>
</body>
</html>
